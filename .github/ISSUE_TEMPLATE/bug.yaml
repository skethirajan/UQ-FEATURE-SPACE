name: Bug report
description: Report a bug with package_name.
labels: ["bug"]

body:
  - type: textarea
    attributes:
      label: Details about the package_name environment
      description: If unsure of the versions, please check your package_name version.
      value: |
        - **package_name version**:
        - **Python version**:
    validations:
      required: true

  - type: textarea
    attributes:
      label: What is the issue?
      description: A short description of what is going wrong.
    validations:
      required: true

  - type: textarea
    attributes:
      label: How can we easily reproduce the issue?
      description: Provide a [minimal reproducible example](https://stackoverflow.com/help/minimal-reproducible-example) of code to reproduce the issue. This is critical. Please do not try to "save time" by omitting it.
      value: |
        ```python
        # Paste your *minimal* example code here
        ```
    validations:
      required: true
