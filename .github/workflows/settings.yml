# .github/workflows/settings.yml
# -------------------------------------------------
# This workflow runs once (on workflow_dispatch) and
# uses the GitHub REST API to enforce the branch‑protection
# rules you described for the `main` branch.
# -------------------------------------------------
name: Repository Settings

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  protect-main:
    runs-on: ubuntu-latest
    steps:
      - name: Set branch protection on main
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.ADMIN_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo  = context.repo.repo;
            const branch = "main";
            // 1. Require status checks (lint, typecheck, test, precommit)
            const requiredChecks = [
              "Pre-commit checks",
              "Test (Python 3.12)",
              "Test (Python 3.13)",
              "lint",
              "typecheck"
            ];
            const protectionSettings = {
              required_status_checks: {
                strict: true,
                contexts: requiredChecks
              },
              enforce_admins: false,
              required_pull_request_reviews: {
                required_approving_review_count: 1,
                dismiss_stale_reviews: true,
                require_code_owner_reviews: true
              },
              restrictions: null,
              required_linear_history: true,
              allow_force_pushes: false,
              allow_deletions: false
            };
            await github.rest.repos.updateBranchProtection({
              owner,
              repo,
              branch,
              ...protectionSettings
            });
            console.log(`✅ Branch protection applied to ${branch}`);
