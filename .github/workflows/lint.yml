# Lint workflow – runs ruff on pull requests
name: Lint

permissions:
  contents: read

on:
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y graphviz graphviz-dev
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv and dev dependencies
        run: |
          python -m pip install --upgrade uv
          uv sync --extra dev
      - name: Run ruff lint
        run: uv run ruff check .
