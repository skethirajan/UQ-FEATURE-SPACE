# Pre-commit configuration
# Run manually: pre-commit run --all-files

repos:
  # General hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
        args: ["--maxkb=1000"]
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: check-toml
      - id: check-yaml
      - id: debug-statements
      - id: end-of-file-fixer
      - id: mixed-line-ending
      - id: trailing-whitespace

  # Jupyter Notebooks - strip output and metadata
  - repo: https://github.com/kynan/nbstripout
    rev: 0.8.1
    hooks:
      - id: nbstripout

  # Ruff - linting and formatting
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.4
    hooks:
      - id: ruff
        args: ["--fix", "--exit-non-zero-on-fix"]
      - id: ruff-format

  # Docformatter - docstring formatting
  - repo: https://github.com/PyCQA/docformatter
    rev: v1.7.7
    hooks:
      - id: docformatter
        additional_dependencies: [tomli]
        args: ["--in-place", "--config", "pyproject.toml"]

  # Pyrefly - type checking
  - repo: https://github.com/facebook/pyrefly-pre-commit
    rev: 0.49.0
    hooks:
      - id: pyrefly-check
        name: Pyrefly (type checking)
        pass_filenames: false
        additional_dependencies: [ # this should match with your dependencies in the pyproject.toml

          # Core numerical stack (aligned with your freeze)
          "numpy>=2.3.5",
          "scipy>=1.17.1",

          # ML / clustering
          "scikit-learn>=1.8.0",
          "hdbscan>=0.8.41",
          "pynndescent>=0.6.0",

          # Config + experiment tracking
          "hydra-core>=1.3.2",
          "omegaconf>=2.3.0",
          "wandb>=0.25.1",

          # Utilities
          "loguru>=0.7.3",
          "pydantic>=2.12.5",
          "tqdm>=4.67.3",

          # Julia through Python (critical for ACE)
          # "juliacall>=0.9.31",

          # Visualization
          "matplotlib>=3.10.8",
          "seaborn>=0.13.2",
          "plotly>=6.6.0",

          # Workflow
          "executorlib[all]>=1.9.1",

          # Structure Parser
          "ase>=3.28.0",

          # CLI
          "typer>=0.24.1",
          "rich>=14.3.3",

        ]

  # Validate pyproject.toml
  - repo: https://github.com/abravalheri/validate-pyproject
    rev: v0.23
    hooks:
      - id: validate-pyproject

  # Commitizen - enforce commit message format
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.1.0
    hooks:
      - id: commitizen
        stages: [commit-msg]

ci:
  autoupdate_schedule: monthly
  autofix_prs: true
